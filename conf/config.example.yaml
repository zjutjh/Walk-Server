# 应用基础配置
app:
  name: "app" # 应用名称
  env: "dev" # 应用环境 dev|test|prod

# HTTP 服务配置
http_server:
  addr: ":8888"
  log:
    # 仅在本地开发调试时打开
    # access_filename: "/dev/stdout"
    # error_filename: "/dev/stderr"

# 业务私有配置
biz:

# 应用业务日志配置
log:
  level: 4 # 日志级别 0: panic 1: fatal 2: error 3: warn 4: info 5: debug 6: trace
  # 仅在本地开发调试时打开
  # filename: "/dev/stdout"

# HTTP Client 配置
resty:
  timeout: "5s"

# 跨域中间件配置
mid_cors:
  allow_origins: [
      # 本地/测试等环境配置 正式环境须去除
      "*",
      "https://test.*.com",

      # 生产环境配置
      "https://prod.*.com",
    ]

# 数据库配置
db:
  host: "127.0.0.1"
  port: 3306
  username: "jh_user"
  password: "jh_pass"
  database: "jh_db"

# # Redis 配置 开启前请在 register/boot.go 中进行 nedis.Boot()
# redis:
#   addrs:
#     - "127.0.0.1:6379"
#   db: 0
#   password: "jh_pass"

# 飞书告警配置
feishu:
  enable: false
  notice_webhook: ""
  notice_secret: ""

session:
  driver: "memory" # 底层驱动 memory(内存) | redis
  name: "session" # 名称
  secret: "secert" # 密钥
  redis: "" # 选取的 Redis 实例
  # cookie 相关配置
  path: # cookie 路径限制
  domain: # cookie 域限制
  max_age: # cookie 生存时间 (过期时间 默认7天)
  secure: # 是否仅允许 HTTPS 发送cookie (开发建议false, 生产配置true)
  http_only: # 是否禁止客户端脚本访问该 cookie（防止 XSS 读取）
  same_site: # 同站策略